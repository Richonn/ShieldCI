name: Docker

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: shieldci:${{ github.sha }}
          outputs: type=docker,dest=/tmp/shieldci.tar
      - name: Load image
        run: docker load --input /tmp/shieldci.tar
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: shieldci:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
