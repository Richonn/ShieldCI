name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  docker:
    needs: [lint, test]
    uses: ./.github/workflows/docker.yml

  security:
    uses: ./.github/workflows/security.yml
